name: popcorn
description: "TMDB-backed movie discovery app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7

  # HTTP
  dio: ^5.7.0

  # DI
  get_it: ^7.7.0

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Env
  flutter_dotenv: ^5.2.1

  # Router
  go_router: ^14.6.2

  # UI helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/splash/
    - assets/images/onboarding/
    - assets/images/characters/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/fraunces/Fraunces-Regular.ttf
        - asset: assets/fonts/fraunces/Fraunces-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/fraunces/Fraunces-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
